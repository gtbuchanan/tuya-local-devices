# Project tooling for developing this repo. Mirrors gtbuchanan/tooling's mise
# convention so local pre-commit runs match the shared hk preset.

# Hard floor for minimum_release_age_excludes (below): older mise silently
# ignores the field instead of failing, so enforce the version.
min_version = "2026.6.2"

[env]
# hk wraps hook steps in `mise x` so mise-managed tools resolve without
# activation.
HK_MISE = "1"
# Route pkl through the external CLI (pinned in [tools]) instead of hk's
# embedded evaluator, whose leniency lets configs pass that the strict CLI
# rejects. Keeps local and CI evaluation identical.
HK_PKL_BACKEND = "pkl"

[hooks]
# Installs hk's git hooks (pre-commit) on `mise install`.
postinstall = "hk install --mise"

[settings]
# Required for the [hooks] table.
experimental = true
lockfile = true
# Matches the Renovate 3-day quarantine on fuzzy/`latest` resolution; the
# exact pins below install immediately.
minimum_release_age = "3d"
# Self-published packages never need the supply-chain quarantine — exclude
# them so fuzzy/`latest` resolution picks up just-cut releases.
minimum_release_age_excludes = ["npm:@gtbuchanan/*"]

# mise.tasks.toml is generated by `gtb sync mise`; this include is the one
# manual hookup (the verify-mise hk step checks it stays wired).
[task_config]
includes = ["mise-tasks", "mise.tasks.toml"]

# Aggregate tasks. The leaf tasks (compile, prepare, test:fast, release) live in
# mise-tasks/; these pure-`depends` aggregates are inline because `test` would
# collide with the test/ task directory (which holds test:fast) and `build:ci`
# can't be a filename (the colon needs a build/ci file, i.e. a build/ dir).
# test aggregates the tiers (just fast for now; add test:slow when it exists).
# build:ci is the CI gate and depends on test:fast directly so it never runs the
# slower tiers — those belong in a separate scheduled job. build runs all tiers
# via test. Linting isn't here: hk runs in the pre-commit job. prepare (the
# worktree/CI bootstrap) is invoked directly, never depended on.
[tasks.test]
depends = ["test:fast"]
description = "Run all test tiers"

[tasks."build:ci"]
depends = ["test:fast"]
description = "The CI build: compile + fast tests (no slow tiers)"

[tasks.build]
depends = ["test"]
description = "Run all tiers: compile + every test tier"

# hk runs the lint hooks; pkl evaluates hk.pkl; node/pnpm back eslint and the
# npm: tools (gtb drives the hk:* tasks, renovate supplies its config
# validator). python + jq drive the device-config build/validation tasks.
[tools]
actionlint = "1.7.12"
hk = "1.51.0"
jq = "1.8.2"
node = "24.18.0"
"npm:@gtbuchanan/cli" = "0.2.0"
"npm:renovate" = "43.231.2"
pkl = "0.31.1"
pnpm = "11.9.0"
python = "3.14.6"
shellcheck = "0.11.0"
shfmt = "3.13.1"
