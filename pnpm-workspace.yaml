allowBuilds:
  esbuild: true
  unrs-resolver: false

catalog:
  '@gtbuchanan/eslint-config': 0.2.0
  '@gtbuchanan/tsconfig': 0.1.1
  '@types/node': 26.0.1
  eslint: 10.6.0
  jiti: 2.7.0
  typescript: 6.0.3

engineStrict: true

hoist: false

lockfileIncludeTarballUrl: false

# 4320 minutes = 3 days, matching the shared Renovate preset's quarantine.
minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  - '@gtbuchanan/*'

strictPeerDependencies: true
